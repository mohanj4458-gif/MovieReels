<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>CineReels — Responsive Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0c;
      --surface:   #111116;
      --surface2:  #18181f;
      --border:    #2a2a35;
      --accent:    #e8c97a;
      --text:      #e8e8ef;
      --muted:     #6b6b80;
      --radius:    24px;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); }
    .logo span { color: var(--text); }

    /* ── Responsive Control Bar ── */
    .controls {
      padding: 12px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column; /* Stacked for mobile */
      gap: 10px;
      align-items: center;
    }

    .upload-row {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: center;
    }

    .search-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 400px;
    }
    
    .file-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 11px;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    
    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      flex: 1;
    }

    .btn-search {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Reel Viewport ── */
    #reels-viewport {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    #reels-viewport::-webkit-scrollbar { display: none; }

    .reel-container {
      height: 100%;
      width: 100%;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .video-frame {
      width: 100%;
      max-width: 360px;
      height: 100%; 
      background: #000;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .subtitle-overlay {
      position: absolute;
      bottom: 40px;
      left: 10px;
      right: 10px;
      text-align: center;
      pointer-events: none;
    }

    .subtitle-bubble {
      display: inline-block;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.4;
      white-space: pre-line;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .pause-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 50px;
      opacity: 0;
      color: var(--accent);
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .empty-state {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Cine<span>Reels</span></div>
  <div id="status" style="font-size: 10px; opacity: 0.6;">Ready</div>
</header>

<div class="controls">
  <div class="upload-row">
    <label class="file-btn">📁 Videos <input type="file" id="videoInput" multiple accept="video/*" hidden></label>
    <label class="file-btn">📄 SRTs <input type="file" id="srtInput" multiple accept=".srt" hidden></label>
  </div>
  <div class="search-row">
    <input type="text" id="searchBox" placeholder="Search dialog...">
    <button class="btn-search" id="searchBtn">Find</button>
  </div>
</div>

<div id="reels-viewport">
  <div class="empty-state">Upload files and search to start.</div>
</div>

<script>
  let videosData = [];
  const reelsViewport = document.getElementById('reels-viewport');
  const searchBtn = document.getElementById('searchBtn');

  const toSec = (t) => {
    const p = t.trim().replace(',', '.').split(':');
    return (+p[0] * 3600) + (+p[1] * 60) + parseFloat(p[2]);
  };

  function parseSRT(data) {
    return data.replace(/\r/g, "").trim().split(/\n\s*\n/).map(block => {
      const lines = block.split("\n");
      const timeLine = lines.find(l => l.includes("-->"));
      if (!timeLine) return null;
      const [start, end] = timeLine.split("-->");
      return { start: toSec(start), end: toSec(end), text: lines.slice(lines.indexOf(timeLine)+1).join(" ") };
    }).filter(Boolean);
  }

  document.getElementById('videoInput').onchange = (e) => {
    videosData = Array.from(e.target.files).map(f => ({ name: f.name, url: URL.createObjectURL(f), subs: [] }));
    document.getElementById('status').innerText = `${videosData.length} Videos Loaded`;
  };

  document.getElementById('srtInput').onchange = (e) => {
    const files = Array.from(e.target.files);
    files.forEach((f, i) => {
      const reader = new FileReader();
      reader.onload = () => { if(videosData[i]) videosData[i].subs = parseSRT(reader.result); };
      reader.readAsText(f);
    });
    document.getElementById('status').innerText = `Captions Linked`;
  };

  searchBtn.onclick = () => {
    const query = document.getElementById('searchBox').value.toLowerCase();
    reelsViewport.innerHTML = "";
    if (!query || !videosData.length) return;

    videosData.forEach((vid) => {
      vid.subs.forEach((s) => {
        if (s.text.toLowerCase().includes(query)) createReel(vid, s);
      });
    });
  };

  function createReel(vidObj, matchSub) {
    const container = document.createElement('div');
    container.className = 'reel-container';

    const frame = document.createElement('div');
    frame.className = 'video-frame';

    const video = document.createElement('video');
    video.src = vidObj.url;
    video.loop = true;
    video.playsInline = true;
    video.muted = false;

    const pauseIcon = document.createElement('div');
    pauseIcon.className = 'pause-indicator';
    pauseIcon.innerHTML = '⏸';

    let manuallyPaused = false;
    frame.onclick = () => {
      if (video.paused) {
        video.muted = false;
        video.play();
        pauseIcon.style.opacity = '0';
        manuallyPaused = false;
      } else {
        video.pause();
        pauseIcon.style.opacity = '1';
        manuallyPaused = true;
      }
    };

    const subOverlay = document.createElement('div');
    subOverlay.className = 'subtitle-overlay';
    const subBubble = document.createElement('div');
    subBubble.className = 'subtitle-bubble';
    subOverlay.appendChild(subBubble);

    video.ontimeupdate = () => {
      const cur = video.currentTime;
      const active = vidObj.subs.find(x => cur >= x.start && cur <= x.end);
      if (active) {
        const idx = vidObj.subs.indexOf(active);
        const prev = vidObj.subs[idx-1]?.text || "";
        const next = vidObj.subs[idx+1]?.text || "";
        subBubble.innerText = [prev, active.text, next].filter(Boolean).join("\n");
        subOverlay.style.display = 'block';
      } else {
        subOverlay.style.display = 'none';
      }
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          if (!manuallyPaused) {
            video.currentTime = matchSub.start;
            video.muted = false;
            video.play().catch(() => {
              video.muted = true; // Browser fallback
              video.play();
            });
            pauseIcon.style.opacity = '0';
          }
        } else {
          video.pause();
        }
      });
    }, { threshold: 0.6 });

    frame.append(video, pauseIcon, subOverlay);
    container.append(frame);
    reelsViewport.append(container);
    observer.observe(container);
  }
</script>

</body>
</html>
